        \ <updated>2025-12-03T21:06:36Z</updated>\n  <link href=\"https://arxiv.org/api/query?search_query=all:machine+OR+all:learning&amp;start=0&amp;max_results=5&amp;id_list=\"
        type=\"application/atom+xml\"/>\n  <opensearch:itemsPerPage>5</opensearch:itemsPerPage>\n
        \ <opensearch:totalResults>454196</opensearch:totalResults>\n  <opensearch:startIndex>0</opensearch:startIndex>\n
        \ <entry>\n    <id>http://arxiv.org/abs/2306.04338v1</id>\n    <title>Changing
        Data Sources in the Age of Machine Learning for Official Statistics</title>\n
        \   <updated>2023-06-07T11:08:12Z</updated>\n    <link href=\"https://arxiv.org/abs/2306.04338v1\"
        rel=\"alternate\" type=\"text/html\"/>\n    <link href=\"https://arxiv.org/pdf/2306.04338v1\"
        rel=\"related\" type=\"application/pdf\" title=\"pdf\"/>\n    <summary>Data
        science has become increasingly essential for the production of official statistics,
        as it enables the automated collection, processing, and analysis of large
        amounts of data. With such data science practices in place, it enables more
        timely, more insightful and more flexible reporting. However, the quality
        and integrity of data-science-driven statistics rely on the accuracy and reliability
        of the data sources and the machine learning techniques that support them.
        In particular, changes in data sources are inevitable to occur and pose significant
        risks that are crucial to address in the context of machine learning for official
        statistics.\n  This paper gives an overview of the main risks, liabilities,
        and uncertainties associated with changing data sources in the context of
        machine learning for official statistics. We provide a checklist of the most
        prevalent origins and causes of changing data sources; not only on a technical
        level but also regarding ownership, ethics, regulation, and public perception.
        Next, we highlight the repercussions of changing data sources on statistical
        reporting. These include technical effects such as concept drift, bias, availability,
        validity, accuracy and completeness, but also the neutrality and potential
        discontinuation of the statistical offering. We offer a few important precautionary
        measures, such as enhancing robustness in both data sourcing and statistical
        techniques, and thorough monitoring. In doing so, machine learning-based official
        statistics can maintain integrity, reliability, consistency, and relevance
        in policy-making, decision-making, and public discourse.</summary>\n    <category
        term=\"stat.ML\" scheme=\"http://arxiv.org/schemas/atom\"/>\n    <category
        term=\"cs.LG\" scheme=\"http://arxiv.org/schemas/atom\"/>\n    <published>2023-06-07T11:08:12Z</published>\n
        \   <arxiv:comment>Presented at UNECE Machine Learning for Official Statistics
        Workshop 2023</arxiv:comment>\n    <arxiv:primary_category term=\"stat.ML\"/>\n
        \   <arxiv:journal_ref>UNECE Machine Learning for Official Statistics Workshop
        2023</arxiv:journal_ref>\n    <author>\n      <name>Cedric De Boom</name>\n
        \   </author>\n    <author>\n      <name>Michael Reusens</name>\n    </author>\n
        \ </entry>\n  <entry>\n    <id>http://arxiv.org/abs/2006.16189v4</id>\n    <title>DOME:
        Recommendations for supervised machine learning validation in biology</title>\n
        \   <updated>2021-01-07T07:29:24Z</updated>\n    <link href=\"https://arxiv.org/abs/2006.16189v4\"
        rel=\"alternate\" type=\"text/html\"/>\n    <link href=\"https://arxiv.org/pdf/2006.16189v4\"
        rel=\"related\" type=\"application/pdf\" title=\"pdf\"/>\n    <summary>Modern
        biology frequently relies on machine learning to provide predictions and improve
        decision processes. There have been recent calls for more scrutiny on machine
        learning performance and possible limitations. Here we present a set of community-wide
        recommendations aiming to help establish standards of supervised machine learning
        validation in biology. Adopting a structured methods description for machine
        learning based on data, optimization, model, evaluation (DOME) will aim to
        help both reviewers and readers to better understand and assess the performance
        and limitations of a method or outcome. The recommendations are formulated
        as questions to anyone wishing to pursue implementation of a machine learning
        algorithm. Answers to these questions can be easily included in the supplementary
        material of published papers.</summary>\n    <category term=\"q-bio.OT\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"cs.LG\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <published>2020-06-25T12:01:39Z</published>\n    <arxiv:primary_category
        term=\"q-bio.OT\"/>\n    <author>\n      <name>Ian Walsh</name>\n    </author>\n
        \   <author>\n      <name>Dmytro Fishman</name>\n    </author>\n    <author>\n
        \     <name>Dario Garcia-Gasulla</name>\n    </author>\n    <author>\n      <name>Tiina
        Titma</name>\n    </author>\n    <author>\n      <name>Gianluca Pollastri</name>\n
        \   </author>\n    <author>\n      <name>The ELIXIR Machine Learning focus
        group</name>\n    </author>\n    <author>\n      <name>Jen Harrow</name>\n
        \   </author>\n    <author>\n      <name>Fotis E. Psomopoulos</name>\n    </author>\n
        \   <author>\n      <name>Silvio C. E. Tosatto</name>\n    </author>\n  </entry>\n
        \ <entry>\n    <id>http://arxiv.org/abs/2201.12150v2</id>\n    <title>Learning
        Curves for Decision Making in Supervised Machine Learning: A Survey</title>\n
        \   <updated>2025-01-28T14:39:26Z</updated>\n    <link href=\"https://arxiv.org/abs/2201.12150v2\"
        rel=\"alternate\" type=\"text/html\"/>\n    <link href=\"https://arxiv.org/pdf/2201.12150v2\"
        rel=\"related\" type=\"application/pdf\" title=\"pdf\"/>\n    <summary>Learning
        curves are a concept from social sciences that has been adopted in the context
        of machine learning to assess the performance of a learning algorithm with
        respect to a certain resource, e.g., the number of training examples or the
        number of training iterations. Learning curves have important applications
        in several machine learning contexts, most notably in data acquisition, early
        stopping of model training, and model selection. For instance, learning curves
        can be used to model the performance of the combination of an algorithm and
        its hyperparameter configuration, providing insights into their potential
        suitability at an early stage and often expediting the algorithm selection
        process. Various learning curve models have been proposed to use learning
        curves for decision making. Some of these models answer the binary decision
        question of whether a given algorithm at a certain budget will outperform
        a certain reference performance, whereas more complex models predict the entire
        learning curve of an algorithm. We contribute a framework that categorises
        learning curve approaches using three criteria: the decision-making situation
        they address, the intrinsic learning curve question they answer and the type
        of resources they use. We survey papers from the literature and classify them
        into this framework.</summary>\n    <category term=\"cs.LG\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <published>2022-01-28T14:34:32Z</published>\n    <arxiv:comment>Accepted
        in Machine Learning Journal</arxiv:comment>\n    <arxiv:primary_category term=\"cs.LG\"/>\n
        \   <arxiv:journal_ref>Machine Learning, Volume 113, pages 8371-8425 (2024)</arxiv:journal_ref>\n
        \   <author>\n      <name>Felix Mohr</name>\n    </author>\n    <author>\n
        \     <name>Jan N. van Rijn</name>\n    </author>\n    <arxiv:doi>10.1007/s10994-024-06619-7</arxiv:doi>\n
        \   <link rel=\"related\" href=\"https://doi.org/10.1007/s10994-024-06619-7\"
        title=\"doi\"/>\n  </entry>\n  <entry>\n    <id>http://arxiv.org/abs/2302.08893v4</id>\n
        \   <title>Active learning for data streams: a survey</title>\n    <updated>2023-11-29T21:07:15Z</updated>\n
        \   <link href=\"https://arxiv.org/abs/2302.08893v4\" rel=\"alternate\" type=\"text/html\"/>\n
        \   <link href=\"https://arxiv.org/pdf/2302.08893v4\" rel=\"related\" type=\"application/pdf\"
        title=\"pdf\"/>\n    <summary>Online active learning is a paradigm in machine
        learning that aims to select the most informative data points to label from
        a data stream. The problem of minimizing the cost associated with collecting
        labeled observations has gained a lot of attention in recent years, particularly
        in real-world applications where data is only available in an unlabeled form.
        Annotating each observation can be time-consuming and costly, making it difficult
        to obtain large amounts of labeled data. To overcome this issue, many active
        learning strategies have been proposed in the last decades, aiming to select
        the most informative observations for labeling in order to improve the performance
        of machine learning models. These approaches can be broadly divided into two
        categories: static pool-based and stream-based active learning. Pool-based
        active learning involves selecting a subset of observations from a closed
        pool of unlabeled data, and it has been the focus of many surveys and literature
        reviews. However, the growing availability of data streams has led to an increase
        in the number of approaches that focus on online active learning, which involves
        continuously selecting and labeling observations as they arrive in a stream.
        This work aims to provide an overview of the most recently proposed approaches
        for selecting the most informative observations from data streams in real
        time. We review the various techniques that have been proposed and discuss
        their strengths and limitations, as well as the challenges and opportunities
        that exist in this area of research.</summary>\n    <category term=\"stat.ML\"
        scheme=\"http://arxiv.org/schemas/atom\"/>\n    <category term=\"cs.LG\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"stat.ME\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <published>2023-02-17T14:24:13Z</published>\n    <arxiv:comment>Published
        in Machine Learning (2023)</arxiv:comment>\n    <arxiv:primary_category term=\"stat.ML\"/>\n
        \   <arxiv:journal_ref>Machine Learning (2023): 1-55</arxiv:journal_ref>\n
        \   <author>\n      <name>Davide Cacciarelli</name>\n    </author>\n    <author>\n
        \     <name>Murat Kulahci</name>\n    </author>\n    <arxiv:doi>10.1007/s10994-023-06454-2</arxiv:doi>\n
        \   <link rel=\"related\" href=\"https://doi.org/10.1007/s10994-023-06454-2\"
        title=\"doi\"/>\n  </entry>\n  <entry>\n    <id>http://arxiv.org/abs/2304.02381v2</id>\n
        \   <title>Physics-Inspired Interpretability Of Machine Learning Models</title>\n
        \   <updated>2024-12-15T17:17:01Z</updated>\n    <link href=\"https://arxiv.org/abs/2304.02381v2\"
        rel=\"alternate\" type=\"text/html\"/>\n    <link href=\"https://arxiv.org/pdf/2304.02381v2\"
        rel=\"related\" type=\"application/pdf\" title=\"pdf\"/>\n    <summary>The
        ability to explain decisions made by machine learning models remains one of
        the most significant hurdles towards widespread adoption of AI in highly sensitive
        areas such as medicine, cybersecurity or autonomous driving. Great interest
        exists in understanding which features of the input data prompt model decision
        making. In this contribution, we propose a novel approach to identify relevant
        features of the input data, inspired by methods from the energy landscapes
        field, developed in the physical sciences. By identifying conserved weights
        within groups of minima of the loss landscapes, we can identify the drivers
        of model decision making. Analogues to this idea exist in the molecular sciences,
        where coordinate invariants or order parameters are employed to identify critical
        features of a molecule. However, no such approach exists for machine learning
        loss landscapes. We will demonstrate the applicability of energy landscape
        methods to machine learning models and give examples, both synthetic and from
        the real world, for how these methods can help to make models more interpretable.</summary>\n
        \   <category term=\"cs.LG\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"cs.AI\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <published>2023-04-05T11:35:17Z</published>\n    <arxiv:comment>6 pages,
        2 figures, ICLR 2023 Workshop on Physics for Machine Learning</arxiv:comment>\n
        \   <arxiv:primary_category term=\"cs.LG\"/>\n    <arxiv:journal_ref>ICLR
        2023 Workshop on Physics for Machine Learning</arxiv:journal_ref>\n    <author>\n
        \     <name>Maximilian P Niroomand</name>\n    </author>\n    <author>\n      <name>David
        J Wales</name>\n    </author>\n  </entry>\n</feed>\n"
