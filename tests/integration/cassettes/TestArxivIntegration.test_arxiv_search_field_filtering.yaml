        xmlns:arxiv=\"http://arxiv.org/schemas/atom\" xmlns=\"http://www.w3.org/2005/Atom\">\n
        \ <id>https://arxiv.org/api/hqKfUmfv2TOKN6qqIw+lxKYqJlE</id>\n  <title>arXiv
        Query: search_query=all:machine OR all:learning&amp;id_list=&amp;start=0&amp;max_results=2</title>\n
        \ <updated>2025-12-03T21:11:34Z</updated>\n  <link href=\"https://arxiv.org/api/query?search_query=all:machine+OR+all:learning&amp;start=0&amp;max_results=2&amp;id_list=\"
        type=\"application/atom+xml\"/>\n  <opensearch:itemsPerPage>2</opensearch:itemsPerPage>\n
        \ <opensearch:totalResults>454196</opensearch:totalResults>\n  <opensearch:startIndex>0</opensearch:startIndex>\n
        \ <entry>\n    <id>http://arxiv.org/abs/2306.04338v1</id>\n    <title>Changing
        Data Sources in the Age of Machine Learning for Official Statistics</title>\n
        \   <updated>2023-06-07T11:08:12Z</updated>\n    <link href=\"https://arxiv.org/abs/2306.04338v1\"
        rel=\"alternate\" type=\"text/html\"/>\n    <link href=\"https://arxiv.org/pdf/2306.04338v1\"
        rel=\"related\" type=\"application/pdf\" title=\"pdf\"/>\n    <summary>Data
        science has become increasingly essential for the production of official statistics,
        as it enables the automated collection, processing, and analysis of large
        amounts of data. With such data science practices in place, it enables more
        timely, more insightful and more flexible reporting. However, the quality
        and integrity of data-science-driven statistics rely on the accuracy and reliability
        of the data sources and the machine learning techniques that support them.
        In particular, changes in data sources are inevitable to occur and pose significant
        risks that are crucial to address in the context of machine learning for official
        statistics.\n  This paper gives an overview of the main risks, liabilities,
        and uncertainties associated with changing data sources in the context of
        machine learning for official statistics. We provide a checklist of the most
        prevalent origins and causes of changing data sources; not only on a technical
        level but also regarding ownership, ethics, regulation, and public perception.
        Next, we highlight the repercussions of changing data sources on statistical
        reporting. These include technical effects such as concept drift, bias, availability,
        validity, accuracy and completeness, but also the neutrality and potential
        discontinuation of the statistical offering. We offer a few important precautionary
        measures, such as enhancing robustness in both data sourcing and statistical
        techniques, and thorough monitoring. In doing so, machine learning-based official
        statistics can maintain integrity, reliability, consistency, and relevance
        in policy-making, decision-making, and public discourse.</summary>\n    <category
        term=\"stat.ML\" scheme=\"http://arxiv.org/schemas/atom\"/>\n    <category
        term=\"cs.LG\" scheme=\"http://arxiv.org/schemas/atom\"/>\n    <published>2023-06-07T11:08:12Z</published>\n
        \   <arxiv:comment>Presented at UNECE Machine Learning for Official Statistics
        Workshop 2023</arxiv:comment>\n    <arxiv:primary_category term=\"stat.ML\"/>\n
        \   <arxiv:journal_ref>UNECE Machine Learning for Official Statistics Workshop
        2023</arxiv:journal_ref>\n    <author>\n      <name>Cedric De Boom</name>\n
        \   </author>\n    <author>\n      <name>Michael Reusens</name>\n    </author>\n
        \ </entry>\n  <entry>\n    <id>http://arxiv.org/abs/2006.16189v4</id>\n    <title>DOME:
        Recommendations for supervised machine learning validation in biology</title>\n
        \   <updated>2021-01-07T07:29:24Z</updated>\n    <link href=\"https://arxiv.org/abs/2006.16189v4\"
        rel=\"alternate\" type=\"text/html\"/>\n    <link href=\"https://arxiv.org/pdf/2006.16189v4\"
        rel=\"related\" type=\"application/pdf\" title=\"pdf\"/>\n    <summary>Modern
        biology frequently relies on machine learning to provide predictions and improve
        decision processes. There have been recent calls for more scrutiny on machine
        learning performance and possible limitations. Here we present a set of community-wide
        recommendations aiming to help establish standards of supervised machine learning
        validation in biology. Adopting a structured methods description for machine
        learning based on data, optimization, model, evaluation (DOME) will aim to
        help both reviewers and readers to better understand and assess the performance
        and limitations of a method or outcome. The recommendations are formulated
        as questions to anyone wishing to pursue implementation of a machine learning
        algorithm. Answers to these questions can be easily included in the supplementary
        material of published papers.</summary>\n    <category term=\"q-bio.OT\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"cs.LG\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <published>2020-06-25T12:01:39Z</published>\n    <arxiv:primary_category
        term=\"q-bio.OT\"/>\n    <author>\n      <name>Ian Walsh</name>\n    </author>\n
        \   <author>\n      <name>Dmytro Fishman</name>\n    </author>\n    <author>\n
        \     <name>Dario Garcia-Gasulla</name>\n    </author>\n    <author>\n      <name>Tiina
        Titma</name>\n    </author>\n    <author>\n      <name>Gianluca Pollastri</name>\n
        \   </author>\n    <author>\n      <name>The ELIXIR Machine Learning focus
        group</name>\n    </author>\n    <author>\n      <name>Jen Harrow</name>\n
        \   </author>\n    <author>\n      <name>Fotis E. Psomopoulos</name>\n    </author>\n
        \   <author>\n      <name>Silvio C. E. Tosatto</name>\n    </author>\n  </entry>\n</feed>\n"
