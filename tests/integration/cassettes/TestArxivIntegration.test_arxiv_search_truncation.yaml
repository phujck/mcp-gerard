      string: "<?xml version='1.0' encoding='UTF-8'?>\n<feed xmlns:opensearch=\"http://a9.com/-/spec/opensearch/1.1/\"
        xmlns:arxiv=\"http://arxiv.org/schemas/atom\" xmlns=\"http://www.w3.org/2005/Atom\">\n
        \ <id>https://arxiv.org/api/rF8jJiTQnvPnsAzkr8Dwib1HVUo</id>\n  <title>arXiv
        Query: search_query=all:deep OR all:learning OR all:collaboration&amp;id_list=&amp;start=0&amp;max_results=5</title>\n
        \ <updated>2025-12-03T21:11:36Z</updated>\n  <link href=\"https://arxiv.org/api/query?search_query=all:deep+OR+(all:learning+OR+all:collaboration)&amp;start=0&amp;max_results=5&amp;id_list=\"
        type=\"application/atom+xml\"/>\n  <opensearch:itemsPerPage>5</opensearch:itemsPerPage>\n
        \ <opensearch:totalResults>519918</opensearch:totalResults>\n  <opensearch:startIndex>0</opensearch:startIndex>\n
        \ <entry>\n    <id>http://arxiv.org/abs/2306.11113v2</id>\n    <title>Learn
        to Accumulate Evidence from All Training Samples: Theory and Practice</title>\n
        \   <updated>2023-06-24T17:45:51Z</updated>\n    <link href=\"https://arxiv.org/abs/2306.11113v2\"
        rel=\"alternate\" type=\"text/html\"/>\n    <link href=\"https://arxiv.org/pdf/2306.11113v2\"
        rel=\"related\" type=\"application/pdf\" title=\"pdf\"/>\n    <summary>Evidential
        deep learning, built upon belief theory and subjective logic, offers a principled
        and computationally efficient way to turn a deterministic neural network uncertainty-aware.
        The resultant evidential models can quantify fine-grained uncertainty using
        the learned evidence. To ensure theoretically sound evidential models, the
        evidence needs to be non-negative, which requires special activation functions
        for model training and inference. This constraint often leads to inferior
        predictive performance compared to standard softmax models, making it challenging
        to extend them to many large-scale datasets. To unveil the real cause of this
        undesired behavior, we theoretically investigate evidential models and identify
        a fundamental limitation that explains the inferior performance: existing
        evidential activation functions create zero evidence regions, which prevent
        the model to learn from training samples falling into such regions. A deeper
        analysis of evidential activation functions based on our theoretical underpinning
        inspires the design of a novel regularizer that effectively alleviates this
        fundamental limitation. Extensive experiments over many challenging real-world
        datasets and settings confirm our theoretical findings and demonstrate the
        effectiveness of our proposed approach.</summary>\n    <category term=\"cs.LG\"
        scheme=\"http://arxiv.org/schemas/atom\"/>\n    <category term=\"cs.AI\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"cs.CV\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <published>2023-06-19T18:27:12Z</published>\n    <arxiv:comment>ICML 2023;
        Analysis and improvement of evidential deep learning theory</arxiv:comment>\n
        \   <arxiv:primary_category term=\"cs.LG\"/>\n    <author>\n      <name>Deep
        Pandey</name>\n    </author>\n    <author>\n      <name>Qi Yu</name>\n    </author>\n
        \ </entry>\n  <entry>\n    <id>http://arxiv.org/abs/2105.04026v2</id>\n    <title>The
        Modern Mathematics of Deep Learning</title>\n    <updated>2023-02-08T16:48:49Z</updated>\n
        \   <link href=\"https://arxiv.org/abs/2105.04026v2\" rel=\"alternate\" type=\"text/html\"/>\n
        \   <link href=\"https://arxiv.org/pdf/2105.04026v2\" rel=\"related\" type=\"application/pdf\"
        title=\"pdf\"/>\n    <summary>We describe the new field of mathematical analysis
        of deep learning. This field emerged around a list of research questions that
        were not answered within the classical framework of learning theory. These
        questions concern: the outstanding generalization power of overparametrized
        neural networks, the role of depth in deep architectures, the apparent absence
        of the curse of dimensionality, the surprisingly successful optimization performance
        despite the non-convexity of the problem, understanding what features are
        learned, why deep architectures perform exceptionally well in physical problems,
        and which fine aspects of an architecture affect the behavior of a learning
        task in which way. We present an overview of modern approaches that yield
        partial answers to these questions. For selected approaches, we describe the
        main ideas in more detail.</summary>\n    <category term=\"cs.LG\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"stat.ML\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <published>2021-05-09T21:30:42Z</published>\n    <arxiv:comment>A version
        of this review paper appears as a chapter in the book \"Mathematical Aspects
        of Deep Learning\" by Cambridge University Press</arxiv:comment>\n    <arxiv:primary_category
        term=\"cs.LG\"/>\n    <arxiv:journal_ref>Mathematical Aspects of Deep Learning,
        pp. 1-111. Cambridge University Press, 2022</arxiv:journal_ref>\n    <author>\n
        \     <name>Julius Berner</name>\n    </author>\n    <author>\n      <name>Philipp
        Grohs</name>\n    </author>\n    <author>\n      <name>Gitta Kutyniok</name>\n
        \   </author>\n    <author>\n      <name>Philipp Petersen</name>\n    </author>\n
        \   <arxiv:doi>10.1017/9781009025096.002</arxiv:doi>\n    <link rel=\"related\"
        href=\"https://doi.org/10.1017/9781009025096.002\" title=\"doi\"/>\n  </entry>\n
        \ <entry>\n    <id>http://arxiv.org/abs/2301.00942v1</id>\n    <title>Deep
        Learning and Computational Physics (Lecture Notes)</title>\n    <updated>2023-01-03T03:56:19Z</updated>\n
        \   <link href=\"https://arxiv.org/abs/2301.00942v1\" rel=\"alternate\" type=\"text/html\"/>\n
        \   <link href=\"https://arxiv.org/pdf/2301.00942v1\" rel=\"related\" type=\"application/pdf\"
        title=\"pdf\"/>\n    <summary>These notes were compiled as lecture notes for
        a course developed and taught at the University of the Southern California.
        They should be accessible to a typical engineering graduate student with a
        strong background in Applied Mathematics.\n  The main objective of these notes
        is to introduce a student who is familiar with concepts in linear algebra
        and partial differential equations to select topics in deep learning. These
        lecture notes exploit the strong connections between deep learning algorithms
        and the more conventional techniques of computational physics to achieve two
        goals. First, they use concepts from computational physics to develop an understanding
        of deep learning algorithms. Not surprisingly, many concepts in deep learning
        can be connected to similar concepts in computational physics, and one can
        utilize this connection to better understand these algorithms. Second, several
        novel deep learning algorithms can be used to solve challenging problems in
        computational physics. Thus, they offer someone who is interested in modeling
        a physical phenomena with a complementary set of tools.</summary>\n    <category
        term=\"cs.LG\" scheme=\"http://arxiv.org/schemas/atom\"/>\n    <category term=\"math-ph\"
        scheme=\"http://arxiv.org/schemas/atom\"/>\n    <published>2023-01-03T03:56:19Z</published>\n
        \   <arxiv:comment>7 chapters</arxiv:comment>\n    <arxiv:primary_category
        term=\"cs.LG\"/>\n    <author>\n      <name>Deep Ray</name>\n    </author>\n
        \   <author>\n      <name>Orazio Pinti</name>\n    </author>\n    <author>\n
        \     <name>Assad A. Oberai</name>\n    </author>\n  </entry>\n  <entry>\n
        \   <id>http://arxiv.org/abs/1711.00146v1</id>\n    <title>A multitask deep
        learning model for real-time deployment in embedded systems</title>\n    <updated>2017-10-31T23:59:23Z</updated>\n
        \   <link href=\"https://arxiv.org/abs/1711.00146v1\" rel=\"alternate\" type=\"text/html\"/>\n
        \   <link href=\"https://arxiv.org/pdf/1711.00146v1\" rel=\"related\" type=\"application/pdf\"
        title=\"pdf\"/>\n    <summary>We propose an approach to Multitask Learning
        (MTL) to make deep learning models faster and lighter for applications in
        which multiple tasks need to be solved simultaneously, which is particularly
        useful in embedded, real-time systems. We develop a multitask model for both
        Object Detection and Semantic Segmentation and analyze the challenges that
        appear during its training. Our multitask network is 1.6x faster, lighter
        and uses less memory than deploying the single-task models in parallel. We
        conclude that MTL has the potential to give superior performance in exchange
        of a more complex training process that introduces challenges not present
        in single-task models.</summary>\n    <category term=\"cs.CV\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <category term=\"cs.LG\" scheme=\"http://arxiv.org/schemas/atom\"/>\n
        \   <published>2017-10-31T23:59:23Z</published>\n    <arxiv:comment>2 pages,
        5 figures. Poster presentation at Swedish Symposium on Deep Learning SSDL2017,
        Stockholm, Sweden. June 20-21, 2017</arxiv:comment>\n    <arxiv:primary_category
        term=\"cs.CV\"/>\n    <arxiv:journal_ref>Swedish Symposium on Deep Learning
        2017</arxiv:journal_ref>\n    <author>\n      <name>Miquel Mart\xED</name>\n
        \   </author>\n    <author>\n      <name>Atsuto Maki</name>\n    </author>\n
        \ </entry>\n  <entry>\n    <id>http://arxiv.org/abs/2012.06469v1</id>\n    <title>DILIE:
        Deep Internal Learning for Image Enhancement</title>\n    <updated>2020-12-11T16:39:44Z</updated>\n
        \   <link href=\"https://arxiv.org/abs/2012.06469v1\" rel=\"alternate\" type=\"text/html\"/>\n
        \   <link href=\"https://arxiv.org/pdf/2012.06469v1\" rel=\"related\" type=\"application/pdf\"
        title=\"pdf\"/>\n    <summary>We consider the generic deep image enhancement
        problem where an input image is transformed into a perceptually better-looking
        image. Recent methods for image enhancement consider the problem by performing
        style transfer and image restoration. The methods mostly fall into two categories:
        training data-based and training data-independent (deep internal learning
        methods). We perform image enhancement in the deep internal learning framework.
        Our Deep Internal Learning for Image Enhancement framework enhances content
        features and style features and uses contextual content loss for preserving
        image context in the enhanced image. We show results on both hazy and noisy
        image enhancement. To validate the results, we use structure similarity and
        perceptual error, which is efficient in measuring the unrealistic deformation
        present in the images. We show that the proposed framework outperforms the
        relevant state-of-the-art works for image enhancement.</summary>\n    <category
        term=\"cs.CV\" scheme=\"http://arxiv.org/schemas/atom\"/>\n    <published>2020-12-11T16:39:44Z</published>\n
        \   <arxiv:primary_category term=\"cs.CV\"/>\n    <author>\n      <name>Indra
        Deep Mastan</name>\n    </author>\n    <author>\n      <name>Shanmuganathan
        Raman</name>\n    </author>\n  </entry>\n</feed>\n"
