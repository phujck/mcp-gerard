        "speaker_name": "James Alvey", "url": null, "user_id": 20561086, "self_speaker":
        false, "speaker_email": null, "workspace_id": 2851628, "non_taggable": false}],
        "speech_id": "2DTRMZHABO3MMJWT", "speech_metadata": {}, "speech_outline":
        [{"id": 10576958941, "text": "Citation System Improvements", "start_offset":
        1536, "end_offset": 1402880, "start_word_offset": 0, "end_word_offset": 241,
        "segments": [{"id": 10576958942, "text": "Will Handley discusses the upgrades
        made to the citation system, emphasizing the need for proper formatting and
        the introduction of positive and negative citations.", "start_offset": 1536,
        "end_offset": 510080, "start_word_offset": 0, "end_word_offset": 91, "segments":
        null, "pipeline": "f_kaldi"}, {"id": 10576958945, "text": "The new system
        now records links to other records as citations, ensuring consistency and
        proper formatting.", "start_offset": 510080, "end_offset": 834879, "start_word_offset":
        92, "end_word_offset": 141, "segments": null, "pipeline": "f_kaldi"}, {"id":
        10576958947, "text": "Will mentions the addition of a pulse feature that alerts
        users about their citations and community citations, aiming to encourage better
        citation practices.", "start_offset": 834879, "end_offset": 1126080, "start_word_offset":
        142, "end_word_offset": 191, "segments": null, "pipeline": "f_kaldi"}, {"id":
        10576958951, "text": "James Alvey questions the necessity of the new citation
        system, suggesting that the current academic credibility system might not
        necessarily produce better results.", "start_offset": 1126080, "end_offset":
        1402880, "start_word_offset": 192, "end_word_offset": 241, "segments": null,
        "pipeline": "f_kaldi"}], "pipeline": "f_kaldi"}, {"id": 10576958955, "text":
        "Encouraging Credibility and Budgeting", "start_offset": 1404800, "end_offset":
        5316799, "start_word_offset": 242, "end_word_offset": 823, "segments": [{"id":
        10576958959, "text": "Will Handley expresses uncertainty about how to implement
        organic pressure to cite others, currently relying on prompts.", "start_offset":
        1404800, "end_offset": 1951678, "start_word_offset": 242, "end_word_offset":
        338, "segments": null, "pipeline": "f_kaldi"}, {"id": 10576958963, "text":
        "James Alvey suggests that introducing constraints, such as resource allocation
        based on credibility, could encourage better citation practices.", "start_offset":
        1951678, "end_offset": 3568000, "start_word_offset": 339, "end_word_offset":
        534, "segments": null, "pipeline": "f_kaldi"}, {"id": 10576958966, "text":
        "The conversation shifts to the need for better budgeting and time management
        within the system, with Will noting the lack of accurate time estimation by
        users.", "start_offset": 3568000, "end_offset": 4526080, "start_word_offset":
        535, "end_word_offset": 673, "segments": null, "pipeline": "f_kaldi"}, {"id":
        10576958969, "text": "James proposes the idea of a research day timeline,
        similar to archive postings, to encourage timely completion of tasks and better
        resource management.", "start_offset": 4541440, "end_offset": 5316799, "start_word_offset":
        674, "end_word_offset": 823, "segments": null, "pipeline": "f_kaldi"}], "pipeline":
        "f_kaldi"}, {"id": 10576958972, "text": "Implementing Research Day Timeline",
        "start_offset": 5316799, "end_offset": 8216000, "start_word_offset": 824,
        "end_word_offset": 1255, "segments": [{"id": 10576958974, "text": "James Alvey
        elaborates on the concept of a research day timeline, suggesting that users
        receive notifications when their day ends, encouraging them to manage their
        time better.", "start_offset": 5316799, "end_offset": 6433599, "start_word_offset":
        824, "end_word_offset": 1016, "segments": null, "pipeline": "f_kaldi"}, {"id":
        10576958977, "text": "Will Handley questions how to quantify compute resources
        and define a research day, considering the non-interruptable nature of certain
        tasks.", "start_offset": 6433599, "end_offset": 7408000, "start_word_offset":
        1017, "end_word_offset": 1157, "segments": null, "pipeline": "f_kaldi"}, {"id":
        10576958980, "text": "The discussion highlights the challenge of implementing
        such a system and the potential benefits of hooks to manage time and resources
        more effectively.", "start_offset": 7408000, "end_offset": 7832640, "start_word_offset":
        1158, "end_word_offset": 1205, "segments": null, "pipeline": "f_kaldi"}, {"id":
        10576958984, "text": "James suggests using Slurm and a budget resource submission
        system to manage compute balances and prevent excessive resource usage.",
        "start_offset": 7832640, "end_offset": 8216000, "start_word_offset": 1206,
        "end_word_offset": 1255, "segments": null, "pipeline": "f_kaldi"}], "pipeline":
        "f_kaldi"}, {"id": 10576958987, "text": "Challenges with Current System and
        Future Developments", "start_offset": 8357120, "end_offset": 11912960, "start_word_offset":
        1256, "end_word_offset": 1917, "segments": [{"id": 10576958988, "text": "Will
        Handley mentions the current limitations of the system, such as the inability
        to run multiple agent runs efficiently due to resource constraints.", "start_offset":
        8357120, "end_offset": 9233599, "start_word_offset": 1256, "end_word_offset":
        1404, "segments": null, "pipeline": "f_kaldi"}, {"id": 10576958989, "text":
        "James Alvey discusses the potential for development work without running
        massive runs, focusing on improving the system''s efficiency and scalability.",
        "start_offset": 9233599, "end_offset": 11282560, "start_word_offset": 1405,
        "end_word_offset": 1778, "segments": null, "pipeline": "f_kaldi"}, {"id":
        10576958990, "text": "Will highlights the progress made in multi-author paper
        submissions, allowing for collaborative editing and signing of drafts.", "start_offset":
        11282560, "end_offset": 11500480, "start_word_offset": 1779, "end_word_offset":
        1825, "segments": null, "pipeline": "f_kaldi"}, {"id": 10576958991, "text":
        "The conversation concludes with a focus on exploring hooks and budgeting
        mechanisms to improve time management and resource allocation within the system.",
        "start_offset": 11500480, "end_offset": 11912960, "start_word_offset": 1826,
        "end_word_offset": 1917, "segments": null, "pipeline": "f_kaldi"}], "pipeline":
