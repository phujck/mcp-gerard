        working.", "start_offset": 8754240, "end_offset": 9334720, "start_word_offset":
        1438, "end_word_offset": 1537, "segments": null, "pipeline": "f_kaldi"}],
        "pipeline": "f_kaldi"}, {"id": 10606043880, "text": "National Year of Reading
