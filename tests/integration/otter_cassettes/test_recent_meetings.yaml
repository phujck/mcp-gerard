        "text": "Weak Employment Market and Youth Unemployment", "start_offset": 14336,
        "end_offset": 1966848, "start_word_offset": 0, "end_word_offset": 347, "segments":
        [{"id": 10606043861, "text": "Unknown Speaker highlights the weak employment
        market, particularly in retail and hospitality sectors.", "start_offset":
        14336, "end_offset": 284096, "start_word_offset": 0, "end_word_offset": 47,
        "segments": null, "pipeline": "f_kaldi"}, {"id": 10606043862, "text": "Speaker
        1 discusses the impact of automation and AI on employment, noting the higher
        costs and risks associated with hiring people.", "start_offset": 286016, "end_offset":
        573440, "start_word_offset": 48, "end_word_offset": 97, "segments": null,
        "pipeline": "f_kaldi"}, {"id": 10606043863, "text": "Alan Milburn''s review
        on young people and work is mentioned, emphasizing the risk of a lost generation
        with 1 million young people economically inactive.", "start_offset": 576319,
        "end_offset": 1091648, "start_word_offset": 98, "end_word_offset": 197, "segments":
        null, "pipeline": "f_kaldi"}, {"id": 10606043864, "text": "Speaker 1 notes
        that youth employment rates have been falling for four years, with 60% of
        the 1 million young people being economically inactive.", "start_offset":
        1091648, "end_offset": 1966848, "start_word_offset": 198, "end_word_offset":
        347, "segments": null, "pipeline": "f_kaldi"}], "pipeline": "f_kaldi"}, {"id":
        10606043865, "text": "Structural Issues and Downward Escalator", "start_offset":
        1969728, "end_offset": 5994240, "start_word_offset": 348, "end_word_offset":
        1047, "segments": [{"id": 10606043866, "text": "Speaker 1 explains the concept
        of a \"downward escalator,\" where young people with poor health and education
        end up on benefits.", "start_offset": 1969728, "end_offset": 2926975, "start_word_offset":
        348, "end_word_offset": 497, "segments": null, "pipeline": "f_kaldi"}, {"id":
        10606043867, "text": "The need for decent jobs, better opportunities, and
        good training is emphasized, with the government''s efforts being insufficient.",
        "start_offset": 2926975, "end_offset": 3162176, "start_word_offset": 498,
        "end_word_offset": 547, "segments": null, "pipeline": "f_kaldi"}, {"id": 10606043868,
        "text": "The discussion touches on the mental health issues of young people,
        with rising neurodiversity conditions leading to economic inactivity.", "start_offset":
        3162176, "end_offset": 4153407, "start_word_offset": 548, "end_word_offset":
        697, "segments": null, "pipeline": "f_kaldi"}, {"id": 10606043869, "text":
        "Speaker 1 mentions the need for fundamental reform across early years, schools,
        skills, mental health, and welfare systems.", "start_offset": 4161087, "end_offset":
        5994240, "start_word_offset": 698, "end_word_offset": 1047, "segments": null,
        "pipeline": "f_kaldi"}], "pipeline": "f_kaldi"}, {"id": 10606043870, "text":
        "Economic and Social Implications", "start_offset": 5994240, "end_offset":
        6827520, "start_word_offset": 1048, "end_word_offset": 1197, "segments": [{"id":
        10606043871, "text": "Speaker 1 discusses the broader systemic failures, including
        early years, schools, skills, mental health, and welfare.", "start_offset":
        5994240, "end_offset": 6137600, "start_word_offset": 1048, "end_word_offset":
        1072, "segments": null, "pipeline": "f_kaldi"}, {"id": 10606043872, "text":
        "The youth guarantee introduced by the government is seen as a good down payment
        but insufficient.", "start_offset": 6137600, "end_offset": 6263360, "start_word_offset":
        1073, "end_word_offset": 1097, "segments": null, "pipeline": "f_kaldi"}, {"id":
        10606043873, "text": "The conversation highlights the social injustice and
        disadvantage associated with becoming NEET, with young people from disadvantaged
        backgrounds being more likely to be NEET.", "start_offset": 6272000, "end_offset":
        6547968, "start_word_offset": 1098, "end_word_offset": 1147, "segments": null,
        "pipeline": "f_kaldi"}, {"id": 10606043874, "text": "Speaker 1 emphasizes
        the existential nature of the issue, calling it an economic, social, and moral
        problem.", "start_offset": 6547968, "end_offset": 6827520, "start_word_offset":
        1148, "end_word_offset": 1197, "segments": null, "pipeline": "f_kaldi"}],
        "pipeline": "f_kaldi"}, {"id": 10606043875, "text": "Employer Concerns and
        Radical Change", "start_offset": 6827520, "end_offset": 9334720, "start_word_offset":
        1198, "end_word_offset": 1537, "segments": [{"id": 10606043876, "text": "Speaker
        1 notes the increased risks for employers hiring young people due to the minimum
        wage and the right to work.", "start_offset": 6827520, "end_offset": 7614848,
        "start_word_offset": 1198, "end_word_offset": 1347, "segments": null, "pipeline":
        "f_kaldi"}, {"id": 10606043877, "text": "The conversation touches on the need
        to minimize risks and maximize opportunities for young people.", "start_offset":
        7614848, "end_offset": 7881599, "start_word_offset": 1348, "end_word_offset":
        1389, "segments": null, "pipeline": "f_kaldi"}, {"id": 10606043878, "text":
        "Speaker 1 calls for radical change to address the systemic issues affecting
        young people.", "start_offset": 7886399, "end_offset": 8669760, "start_word_offset":
        1390, "end_word_offset": 1437, "segments": null, "pipeline": "f_kaldi"}, {"id":
        10606043879, "text": "The discussion emphasizes the importance of change for
