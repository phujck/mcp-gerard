models:
  gemini-3-pro-preview:
    # Model metadata
    description: "Most intelligent model with state-of-the-art reasoning and multimodal understanding"
    capabilities: "🌟 Best for: Agentic workflows, autonomous coding, complex multimodal tasks, advanced reasoning"
    tags: ["gemini-3", "pro", "latest", "multimodal", "reasoning"]
    context_window: "1,000,000 tokens"
    output_tokens: 64000

    # Capabilities
    supports_vision: true
    supports_grounding: true
    supports_thinking_level: true
    supports_media_resolution: true
    supports_thought_signatures: true

    # Pricing (tiered based on token count)
    input_tiers:
      - threshold: 200000
        price: 2.00
      - threshold: .inf
        price: 4.00
    output_tiers:
      - threshold: 200000
        price: 12.00
      - threshold: .inf
        price: 18.00

  gemini-2.5-pro:
    # Model metadata
    description: "Powerful reasoning model excelling at coding and complex reasoning tasks"
    capabilities: "🎯 Best for: Complex reasoning, analysis, multimodal tasks, long documents"
    tags: ["gemini-2.5", "pro", "multimodal"]
    context_window: "2,000,000 tokens"
    output_tokens: 65536

    # Capabilities
    supports_vision: true
    supports_grounding: true

    # Pricing (tiered based on token count)
    input_tiers:
      - threshold: 200000
        price: 1.25
      - threshold: .inf
        price: 2.50
    output_tiers:
      - threshold: 200000
        price: 10.00
      - threshold: .inf
        price: 15.00
    free_tier: true

  gemini-2.5-flash:
    # Model metadata
    description: "Fast, efficient model balancing speed and intelligence"
    capabilities: "⚖️ Best for: Most general tasks, balanced performance and speed"
    tags: ["gemini-2.5", "flash", "general", "multimodal"]
    context_window: "1,000,000 tokens"
    output_tokens: 65536

    # Capabilities
    supports_vision: true
    supports_grounding: true

    # Pricing (by modality)
    input_by_modality:
      text: 0.30
      image: 0.30
      video: 0.30
      audio: 1.00
    output_per_1m: 2.50
    free_tier: true

  gemini-2.5-flash-lite:
    # Model metadata
    description: "Fastest, most cost-effective model for simple tasks"
    capabilities: "⚡ Best for: Simple queries, high-volume tasks, cost-sensitive applications"
    tags: ["gemini-2.5", "flash", "cost-effective", "fast"]
    context_window: "1,000,000 tokens"
    output_tokens: 64000

    # Capabilities
    supports_vision: true
    supports_grounding: true

    # Pricing (by modality)
    input_by_modality:
      text: 0.10
      image: 0.10
      video: 0.10
      audio: 0.30
    output_per_1m: 0.40
    free_tier: true

  # Image generation models
  imagen-4.0-generate-001:
    # Model metadata
    description: "High-quality image generation (standard quality)"
    capabilities: "🎨 Best for: Standard quality image generation"
    tags: ["image-generation", "latest"]
    context_window: "N/A (Image generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per image)
    price_per_image: 0.040
    pricing_type: "per_image"
    quality: "standard"

  imagen-4.0-fast-generate-001:
    # Model metadata
    description: "Fast image generation"
    capabilities: "⚡ Best for: Quick image generation"
    tags: ["image-generation", "latest", "fast"]
    context_window: "N/A (Image generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per image)
    price_per_image: 0.020
    pricing_type: "per_image"
    quality: "fast"

  imagen-4.0-ultra-generate-001:
    # Model metadata
    description: "Ultra-high quality image generation"
    capabilities: "🎨 Best for: Ultra-high quality artistic images"
    tags: ["image-generation", "latest", "premium"]
    context_window: "N/A (Image generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per image)
    price_per_image: 0.060
    pricing_type: "per_image"
    quality: "ultra"

  imagen-4.0-generate-preview-06-06:
    # Model metadata
    description: "Preview version of Imagen 4 (standard quality)"
    capabilities: "🎨 Best for: Testing Imagen 4 features (preview)"
    tags: ["image-generation", "preview"]
    context_window: "N/A (Image generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per image) - same as standard Imagen 4
    price_per_image: 0.040
    pricing_type: "per_image"
    quality: "standard"

  imagen-3.0-generate-002:
    # Model metadata
    description: "Previous generation image model"
    capabilities: "🎨 Best for: High-quality image generation (legacy)"
    tags: ["image-generation", "legacy"]
    context_window: "N/A (Image generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per image)
    price_per_image: 0.030
    pricing_type: "per_image"
    quality: "standard"

  # Video generation models
  veo-2.0-generate-001:
    # Model metadata
    description: "High-quality video generation model"
    capabilities: "🎬 Best for: Video content creation"
    tags: ["video-generation", "latest"]
    context_window: "N/A (Video generation)"

    # Capabilities
    supports_vision: false
    supports_grounding: false

    # Pricing (per second)
    price_per_second: 0.35
    pricing_type: "per_second"

# Display categories (how to group models by tags for presentation)
display_categories:
  - name: "🌟 Gemini 3 Series"
    tags: ["gemini-3"]
    description: "Most advanced generation with state-of-the-art reasoning (recommended)"
  - name: "🚀 Gemini 2.5 Series"
    tags: ["gemini-2.5"]
    description: "Powerful generation with free tiers available"
  - name: "🎨 Image Generation"
    tags: ["image-generation"]
    description: "High-quality image generation models"
  - name: "🎬 Video Generation"
    tags: ["video-generation"]
    description: "Video content creation models"

# Default model
default_model: "gemini-3-pro-preview"

# Usage notes
usage_notes:
  - "Gemini 3 Pro Preview is the recommended default for best performance"
  - "Gemini 3 Pro supports thinking_level (low/high) for controlling reasoning depth"
  - "Gemini 3 Pro supports media_resolution for multimodal vision control"
  - "Gemini 3 Pro uses thought signatures for maintaining reasoning context"
  - "Gemini 3 Pro has 1M token context window, 64k output tokens"
  - "Gemini 3 Pro defaults to temperature 1.0 (strongly recommended per documentation)"
  - "Gemini 2.5 Pro, Flash, and Flash-Lite have free tiers available"
  - "Pro models have large context windows (1M-2M tokens)"
  - "Flash models balance speed and capability with lower costs"
  - "All text models support multimodal input (text, images, video)"
  - "Audio input has higher costs than text/image/video for Flash models"
  - "Tiered pricing applies to Pro models based on token count thresholds"
  - "Google Search grounding: 1,500 RPD free, then additional charges apply"
  - "Image generation models charge per image ($0.02-$0.06)"
  - "Video generation models charge per second ($0.35)"
