    description: "Smartest Claude model for complex agents and coding"
    capabilities: "🌟 Best for: Complex agents, coding, agentic workflows, extended thinking"
    tags: ["claude-4.5", "sonnet", "general", "latest"]
    context_window: "200,000 tokens (~150,000 words)"
    input_tokens: 200000
    output_tokens: 64000

    # Capabilities
    supports_vision: true
    supports_system_prompt: true
    supports_extended_thinking: true

    # Pricing
    input_per_1m: 3.00
    output_per_1m: 15.00

  claude-haiku-4-5-20251001:
    # Model metadata
    description: "Fastest Claude model with near-frontier intelligence"
    capabilities: "⚡ Best for: Quick tasks, high-throughput processing, cost-effective intelligence"
    tags: ["claude-4.5", "haiku", "fast", "cost-effective", "latest"]
    context_window: "200,000 tokens (~150,000 words)"
    input_tokens: 200000
    output_tokens: 64000

    # Capabilities
    supports_vision: true
    supports_system_prompt: true
    supports_extended_thinking: true

    # Pricing
    input_per_1m: 1.00
    output_per_1m: 5.00

  claude-opus-4-1-20250805:
    # Model metadata
    description: "Exceptional Claude model for specialized reasoning tasks"
    capabilities: "🎯 Best for: Specialized reasoning, complex analysis, critical tasks"
    tags: ["claude-4", "opus", "premium", "latest"]
    context_window: "200,000 tokens (~150,000 words)"
    input_tokens: 200000
    output_tokens: 32000

    # Capabilities
    supports_vision: true
    supports_system_prompt: true
    supports_extended_thinking: true

    # Pricing
    input_per_1m: 15.00
    output_per_1m: 75.00

# Cache pricing (optional feature)
cache_pricing:
  5_minute_cache:
    claude-opus-4-1-20250805: 18.75
    claude-sonnet-4-5-20250929: 3.75
    claude-haiku-4-5-20251001: 1.00

  1_hour_cache:
    claude-opus-4-1-20250805: 30.00
    claude-sonnet-4-5-20250929: 6.00
    claude-haiku-4-5-20251001: 1.60

# Display categories (how to group models by tags for presentation)
display_categories:
  - name: "🚀 Claude 4.5 Series"
    tags: ["claude-4.5"]
    description: "Latest generation Claude models with extended thinking and enhanced capabilities"
  - name: "🎯 Claude 4 Series"
    tags: ["claude-4"]
    description: "Exceptional Claude models for specialized reasoning tasks"

# Default model
default_model: "claude-sonnet-4-5-20250929"

